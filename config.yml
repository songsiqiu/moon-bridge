mode: "Transform"

server:
  addr: "127.0.0.1:38440"

persistence:
  active_provider: "db_sqlite"

cache:
  mode: "explicit"
  ttl: "5m"
  prompt_caching: true

extensions:
  deepseek_v4:
    config:
      reinforce_instructions: true
  visual:
    config:
      provider: "kimi"
      model: "kimi-for-coding"
      max_rounds: 4
      max_tokens: 2048
  db_sqlite:
    enabled: true
    config:
      path: "./data/moonbridge.db"
      wal: true
      busy_timeout_ms: 5000
      max_open_conns: 1
  metrics:
    enabled: true
    config:
      default_limit: 100
      max_limit: 1000

models:
  deepseek-v4-pro:
    context_window: 1000000
    max_output_tokens: 384000
    default_reasoning_level: "high"
    supported_reasoning_levels:
      - effort: "high"
        description: "High reasoning effort"
      - effort: "xhigh"
        description: "Extra high reasoning effort"
    extensions:
      deepseek_v4:
        enabled: true
      visual:
        enabled: false
  kimi-for-coding:
    context_window: 128000

providers:
  deepseek:
    base_url: "https://api.deepseek.com/anthropic"
    api_key: "sk-37e554a6d1c245e39b78578f2506f9ae"
    version: "2023-06-01"
    offers:
      - model: deepseek-v4-pro
  kimi:
    base_url: "https://api.moonshot.ai/anthropic"
    api_key: "sk-你的Kimi密钥"
    version: "2023-06-01"
    offers:
      - model: kimi-for-coding

routes:
  moonbridge:
    model: deepseek-v4-pro
    provider: deepseek

defaults:
  model: moonbridge
  max_tokens: 4096
